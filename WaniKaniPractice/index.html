<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=M+PLUS+1p&family=Noto+Sans+JP:wght@100..900&family=Noto+Serif+JP:wght@200..900&family=Shippori+Mincho+B1&family=Yuji+Syuku&family=Zen+Antique&family=Zen+Maru+Gothic&display=swap"
        rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WaniKani Vocab Practice</title>
</head>

<body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <header class="header">
        <h1>WaniKani Vocab Practice</h1>
        <img src="src/assets/settings.svg" alt="Settings" class="clickable-icon" id="settings-btn">
    </header>

    <div class="setup-area">
        <button class="setup-btn">Setup</button>
    </div>

    <div class="main hidden">
        <div class="hint-area">
            <h2 class="characters">
                <div class="hint-text"></div>
            </h2>
            <div class="readings" class="hint-item ">
                <span class="hint-label">Reading(s):</span>
                <span class="hint-text"></span>
            </div>
            <div class="meanings" class="hint-item ">
                <span class="hint-label">Meaning(s):</span>
                <span class="hint-text"></span>
            </div>
            <div class="wordTypes" class="hint-item ">
                <span class="hint-label">Type:</span>
                <span class="hint-text"></span>
            </div>
        </div>
        <div class="vocab-area">
            <div class="sentence-jp"></div>
            <div class="answer">
                <div class="sentence-kana"></div>
                <div class="sentence-en"></div>
            </div>
        </div>
        <div id="buttons">
            <button id="hint-btn">Show Hint</button>
            <button id="show-answer-btn">Show Answer</button>
            <button id="next-sentence-btn">Next Sentence</button>
            <button id="reset-btn">Reset</button>
        </div>
    </div>

    <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal">
            <h3>Settings</h3>

            <div class="setting-item">
                <label for="api-token">WaniKani API Token</label>
                <input type="text" id="api-token" maxlength="50" placeholder="Enter your API token">
            </div>

            <div class="setting-item">
                <label for="sentence-font">Sentence Font</label>
                <select id="sentence-font">
                </select>
            </div>

            <div class="modal-actions">
                <button class="cancel-btn">Cancel</button>
                <button class="save-btn">Save</button>
            </div>
        </div>
    </div>

    <div id="start-modal" class="modal-overlay hidden">
        <div class="modal">
            <div class="radio-group">
                <label>
                    <input type="radio" name="practice-type" value="levels" checked> Levels
                </label>
                <label>
                    <input type="radio" name="practice-type" value="days"> Lessons
                </label>
                <label>
                    <input type="radio" name="practice-type" value="critical"> Critical
                </label>
            </div>

            <div class="warnings">
                <p id="start-warning" class="warning hidden"></p>
            </div>

            <div class="levels-range hidden">
                <div class="input-row">
                    <label for="from-level">From Level:</label>
                    <input id="from-level" class="number-input" type="number" min="1" max="60" step="1" value="1">
                </div>
                <div class="input-row">
                    <label for="to-level">To Level:</label>
                    <input id="to-level" class="number-input" type="number" min="1" max="60" step="1" value="5">
                </div>
            </div>

            <div class="days-range hidden">
                <div class="input-row">
                    <label for="at-date">At Date:</label>
                    <input type="date" id="at-date" name="at-date" />
                </div>
            </div>

            <button id="start-btn">Start Practice</button>
        </div>
    </div>


</body>

</html>

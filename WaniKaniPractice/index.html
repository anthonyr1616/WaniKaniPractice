<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wanikanipractice</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <header class="header">
        <h1>WaniKani Vocab Practice</h1>
        <img src="src/assets/settings.svg" alt="Settings" class="clickable-icon" id="settings-btn">
    </header>

    <div class="setup-area">
        <button class="setup-btn">Setup</button>
    </div>

    <div class="main hidden">
        <div class="hint-area">
            <h2 class="characters">
                <div class="hint-text">名字</div>
            </h2>
            <div class="readings" class="hint-item ">
                <span class="hint-label">Readings:</span>
                <span class="hint-text">みょうじ</span>
            </div>
            <div class="meanings" class="hint-item ">
                <span class="hint-label">Meaning(s):</span>
                <span class="hint-text">Surname</span>
            </div>
            <div class="wordTypes" class="hint-item ">
                <span class="hint-label">Type:</span>
                <span class="hint-text">intransitive verb, ichidan verb</span>
            </div>
        </div>
        <div class="vocab-area">
            <div class="sentence-jp">名字は「田中」です。</div>
            <div class="answer">
                <div class="sentence-kana">みょうじ は「 たなか」 です。</div>
                <div class="sentence-en">My surname is "Tanaka".</div>
            </div>
        </div>
        <div id="buttons">
            <button id="showAnswer">Show Answer</button>
            <button id="hintBtn">Show Hint</button>
            <button id="reset">Reset</button>
            <button id="nextSentence">Next Sentence</button>
        </div>
    </div>

    <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal">
            <h3>Settings</h3>

            <div class="setting-item">
                <label for="api-token">WaniKani API Token</label>
                <input type="text" id="api-token" maxlength="50" placeholder="Enter your API token">
            </div>

            <div class="setting-item">
                <label for="sentenceFont">Sentence Font</label>
                <select id="sentenceFont">
                    <option value="random">Random</option>
                    <option value="sans-serif">Sans-serif</option>
                    <option value="serif">Serif</option>
                    <option value="monospace">Monospace</option>
                </select>
            </div>

            <div class="modal-actions">
                <button class="cancel-btn">Cancel</button>
                <button class="save-btn">Save</button>
            </div>
        </div>
    </div>

    <div id="start-modal" class="modal-overlay hidden">
        <div class="modal">
            <div class="radio-group">
                <label>
                    <input type="radio" name="practice-type" value="levels" checked> Levels
                </label>
                <label>
                    <input type="radio" name="practice-type" value="days"> Lessons
                </label>
                <label>
                    <input type="radio" name="practice-type" value="critical"> Critical
                </label>
            </div>

            <div class="levels-range hidden">
                <div class="input-row">
                    <label for="from-lvl">From Lvl:</label>
                    <input id="from-lvl" type="number" min="1" max="60" step="1" value="1">
                </div>
                <div class="input-row">
                    <label for="to-lvl">To Lvl:</label>
                    <input id="to-lvl" type="number" min="1" max="60" step="1" value="5">
                </div>
            </div>

            <div class="days-range hidden">
                <div class="input-row">
                    <label for="days-input">Days:</label>
                    <input id="days-input" type="number" min="1" max="31" step="1">
                </div>
            </div>

            <button id="start-btn">Start Practice</button>
        </div>
    </div>


  </body>
</html>
